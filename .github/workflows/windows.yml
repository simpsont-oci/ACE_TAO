name: windows

on:
  push:
  pull_request:
  schedule:
    - cron: '0 1 * * SUN'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: VS2022WChar
            vmimage: windows-2022
            mpctype: vs2022
            BuildPlatform: x64
            BuildConfiguration: Debug
            vcpkgarch: x64-windows
            vcpkglibdir: debug/lib
            vcpkgpackages: '"openssl", {"name": "xerces-c", "features": ["xmlch-wchar"]}'
            OptionalFeatures: uses_wchar=1
          - name: VS2022Debug32
            vmimage: windows-2022
            mpctype: vs2022
            BuildPlatform: Win32
            BuildConfiguration: Debug
            vcpkgarch: x86-windows
            vcpkglibdir: debug/lib
            vcpkgpackages: '"openssl", "xerces-c"'
          - name: VS2022Release32
            vmimage: windows-2022
            mpctype: vs2022
            BuildPlatform: Win32
            BuildConfiguration: Release
            vcpkgarch: x86-windows
            vcpkglibdir: lib
            vcpkgpackages: '"openssl", "xerces-c"'
          - name: VS2022Debug64Cxx17
            vmimage: windows-2022
            mpctype: vs2022
            BuildPlatform: x64
            BuildConfiguration: Debug
            vcpkgarch: x64-windows
            vcpkglibdir: debug/lib
            vcpkgpackages: '"openssl", "xerces-c", "zlib"'
            OptionalMpcArgs: -value_template LanguageStandard=stdcpp17
          - name: VS2022Debug64Cxx20
            vmimage: windows-2022
            mpctype: vs2022
            BuildPlatform: x64
            BuildConfiguration: Debug
            vcpkgarch: x64-windows
            vcpkglibdir: debug/lib
            vcpkgpackages: '"openssl", "xerces-c", "zlib"'
            OptionalMpcArgs: -value_template LanguageStandard=stdcpp20
    runs-on: ${{ matrix.vmimage }}
    name: ${{ matrix.name }}
    env:
      ACE_ROOT: ${{ github.workspace }}/ACE
      TAO_ROOT: ${{ github.workspace }}/TAO
      MPC_ROOT: ${{ github.workspace }}/MPC
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      XERCESC_INCDIR: ${{ github.workspace }}/vcpkg_installed/${{ matrix.vcpkgarch }}/include
      XERCESC_LIBDIR: ${{ github.workspace }}/vcpkg_installed/${{ matrix.vcpkgarch }}/${{ matrix.vcpkglibdir }}
      SSL_INCDIR: ${{ github.workspace }}/vcpkg_installed/${{ matrix.vcpkgarch }}/include
      SSL_LIBDIR: ${{ github.workspace }}/vcpkg_installed/${{ matrix.vcpkgarch }}/${{ matrix.vcpkglibdir }}
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkgarch }}
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
    steps:
    - name: checkout ACE/TAO
      uses: actions/checkout@v6
    - name: checkout MPC
      uses: actions/checkout@v6
      with:
        repository: DOCGroup/MPC
        path: ${{ env.MPC_ROOT }}
    - name: create vcpkg.json
      run: |
        '{"name": "tao", "version-string": "githubaction", "dependencies": [ ${{ matrix.vcpkgpackages }} ]}' > vcpkg.json
      shell: pwsh
    - name: Install vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 62159a45e18f3a9ac0548628dcaf74fcb60c6ff9
        runVcpkgInstall: true
    - name: create $ACE_ROOT/ace/config.h
      run: |
        '#include "ace/config-win32.h"' > ${env:ACE_ROOT}/ace/config.h
      shell: pwsh
    - name: create $ACE_ROOT/bin/MakeProjectCreator/config/default.features
      run: |
        echo "ipv6=1" | out-file -encoding ASCII ${env:ACE_ROOT}/bin/MakeProjectCreator/config/default.features
        echo "xerces3=1" | out-file -append -encoding ASCII ${env:ACE_ROOT}/bin/MakeProjectCreator/config/default.features
        echo "ssl=1" | out-file -append -encoding ASCII ${env:ACE_ROOT}/bin/MakeProjectCreator/config/default.features
        echo "openssl11=1" | out-file -append -encoding ASCII ${env:ACE_ROOT}/bin/MakeProjectCreator/config/default.features
        echo "versioned_namespace=1" | out-file -append -encoding ASCII ${env:ACE_ROOT}/bin/MakeProjectCreator/config/default.features
      shell: pwsh
    - name: Add optional features ${{ matrix.OptionalFeatures }}
      run: |
        echo "${{ matrix.OptionalFeatures }}" | out-file -append -encoding ASCII ${env:ACE_ROOT}/bin/MakeProjectCreator/config/default.features
      shell: pwsh
      if: matrix.OptionalFeatures != ''
    - name: Run mwc.pl on $(TAO_ROOT)/TAO_ACE.mwc
      run: |
        perl ${env:ACE_ROOT}/bin/mwc.pl -type ${{ matrix.mpctype }} ${env:TAO_ROOT}/TAO_ACE.mwc -workers 4 ${{ matrix.OptionalMpcArgs }}
      shell: pwsh
    - name: Run mwc.pl on $(ACE_ROOT)/tests/tests.mwc
      run: |
        perl ${env:ACE_ROOT}/bin/mwc.pl -type ${{ matrix.mpctype }} ${env:ACE_ROOT}/tests/tests.mwc -workers 4 ${{ matrix.OptionalMpcArgs }}
      shell: pwsh
    - name: Run mwc.pl on $(TAO_ROOT)/tests/IDL_Test
      run: |
        perl ${env:ACE_ROOT}/bin/mwc.pl -type ${{ matrix.mpctype }} ${env:TAO_ROOT}/tests/IDL_Test -workers 4 ${{ matrix.OptionalMpcArgs }}
      shell: pwsh
    - name: Setup msbuild
      uses: microsoft/setup-msbuild@v1
    - name: Build solution TAO/TAO_ACE.sln
      run: msbuild -maxcpucount -p:Platform=${{ matrix.BuildPlatform }} -p:Configuration=${{ matrix.BuildConfiguration }} TAO/TAO_ACE.sln
    - name: Build solution ACE/tests/tests.sln
      run: msbuild -maxcpucount -p:Platform=${{ matrix.BuildPlatform }} -p:Configuration=${{ matrix.BuildConfiguration }} ACE/tests/tests.sln
    - name: Build solution TAO/tests/IDL_Test/IDL_Test.sln
      run: msbuild -maxcpucount -p:Platform=${{ matrix.BuildPlatform }} -p:Configuration=${{ matrix.BuildConfiguration }} TAO/tests/IDL_Test/IDL_Test.sln
    - name: Run ACE full test suite
      if: matrix.name == 'VS2022Debug64Cxx20'
      working-directory: ${{ env.ACE_ROOT }}/tests
      shell: pwsh
      run: |
        $exeSubDir = "${{ matrix.BuildPlatform }}/${{ matrix.BuildConfiguration }}"
        $env:PATH = "${env:ACE_ROOT}\lib;${env:ACE_ROOT}\lib\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }};${env:ACE_ROOT}\tests\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }};${{ github.workspace }}\vcpkg_installed\${{ matrix.vcpkgarch }}\debug\bin;${{ github.workspace }}\vcpkg_installed\${{ matrix.vcpkgarch }}\bin;$env:PATH"
        & perl .\run_test.pl -ExeSubDir $exeSubDir -Config ARCH -Config Win32 -Config MSVC -Config FIXED_BUGS_ONLY -Config GHA 2>&1 |
          Tee-Object -FilePath run_test_full_suite.log
        $runExit = $LASTEXITCODE
        $failures = Select-String -Path run_test_full_suite.log -Pattern '^(Error|ERROR):', 'auto_run_tests_finished:.*Result:(?!0\b)-?\d+'
        if ($runExit -ne 0) {
          Write-Error "run_test.pl failed with exit status $runExit"
          exit $runExit
        }
        if ($failures) {
          $failures | ForEach-Object { Write-Output $_.Line }
          Write-Error "ACE full test suite reported errors or failing test results."
          exit 1
        }
    - name: Upload ACE full test suite logs
      if: always() && matrix.name == 'VS2022Debug64Cxx20'
      uses: actions/upload-artifact@v4
      with:
        name: windows-ace-full-test-suite
        path: |
          ${{ env.ACE_ROOT }}/tests/run_test_full_suite.log
          ${{ env.ACE_ROOT }}/tests/log
        if-no-files-found: ignore
    - name: Run Proactor Win32 correctness smoke tests
      if: matrix.name == 'VS2022Debug64Cxx17'
      working-directory: ${{ env.ACE_ROOT }}/tests
      shell: pwsh
      run: |
        $env:PATH = "${env:ACE_ROOT}\lib;${env:ACE_ROOT}\lib\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }};${env:ACE_ROOT}\tests\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }};$env:PATH"
        $env:RUN_ID = "gha-win32-correctness"
        $env:BASE_PORT = "23000"
        perl .\run_proactor_correctness_matrix.pl --backend win32 `
          --test Proactor_Contract_Test `
          --test Proactor_File_Test `
          --test Proactor_Network_Performance_Test:tcp `
          --test Proactor_Network_Performance_Test:udp `
          --test Proactor_Scatter_Gather_Test `
          --test Proactor_Stress_Test `
          --test Proactor_Test `
          --test Proactor_Test_IPV6 `
          --test Proactor_Timer_Test `
          --test Proactor_UDP_Test
    - name: Run Proactor Win32 performance smoke tests
      if: matrix.name == 'VS2022Debug64Cxx17'
      working-directory: ${{ env.ACE_ROOT }}/tests
      shell: pwsh
      run: |
        $env:PATH = "${env:ACE_ROOT}\lib;${env:ACE_ROOT}\lib\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }};${env:ACE_ROOT}\tests\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }};$env:PATH"
        $env:RUN_ID = "gha-win32-performance"
        $env:BASE_PORT = "24000"
        perl .\run_proactor_performance_matrix.pl --backend win32 `
          --scenario stress_recursive `
          --scenario tcp_1x1_light_v4 `
          --scenario tcp_1x16_moderate_mt_v4 `
          --scenario udp_1x16_moderate_mt_buf4m_v4
    - name: Upload Proactor Win32 smoke logs
      if: always() && matrix.name == 'VS2022Debug64Cxx17'
      uses: actions/upload-artifact@v4
      with:
        name: windows-proactor-win32-smoke
        path: |
          ${{ env.ACE_ROOT }}/tests/log/proactor_matrix/gha-win32-correctness
          ${{ env.ACE_ROOT }}/tests/log/proactor_performance/gha-win32-performance
        if-no-files-found: ignore
